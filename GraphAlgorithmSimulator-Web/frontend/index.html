<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Algorithm Simulator</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Graph Simulator</h2>
                <span class="badge">PRO</span>
            </div>

            <div class="control-group">
                <h3>1. Graph Definition</h3>
                <div class="input-field">
                    <label for="numVertices">Number of Vertices (N)</label>
                    <input type="number" id="numVertices" placeholder="e.g. 5" min="1" max="50" value="5">
                </div>
                <div class="input-field">
                    <label for="edges">Edge List (u v weight)</label>
                    <textarea id="edges" rows="5" placeholder="0 1 10&#10;1 2 20&#10;0 3 5">0 1 10
0 2 5
1 2 2
1 3 1
2 3 9
2 4 2
3 4 4</textarea>
                </div>
                <div class="checkbox-field">
                    <input type="checkbox" id="isDirected">
                    <label for="isDirected">Directed Graph</label>
                </div>
                <button id="btnCreateGraph" class="btn btn-primary">Create Graph</button>
            </div>

            <div class="control-group">
                <h3>2. Algorithm Setup</h3>
                <div class="row">
                    <div class="input-field half">
                        <label for="startNode">Start Node</label>
                        <input type="number" id="startNode" placeholder="e.g. 0" min="0" value="0">
                    </div>
                    <div class="input-field half">
                        <label for="targetNode">Target (Opt)</label>
                        <input type="number" id="targetNode" placeholder="e.g. 4" min="0" value="4">
                    </div>
                </div>
                <div class="input-field">
                    <label for="animSpeed">Animation Speed</label>
                    <input type="range" id="animSpeed" min="100" max="2000" value="800" dir="rtl">
                </div>
            </div>

            <div class="control-group">
                <h3>3. Run Algorithms</h3>
                <div class="action-buttons">
                    <button id="btnDFS" class="btn btn-secondary">DFS</button>
                    <button id="btnBFS" class="btn btn-secondary">BFS</button>
                    <button id="btnDijkstra" class="btn btn-accent">Dijkstra</button>
                </div>
                <button id="btnReset" class="btn btn-danger mt-3">Reset / Clear</button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace">
            <!-- Top bar -->
            <header class="workspace-header">
                <div class="status-indicator">
                    <div class="status-dot green" id="serverStatusDot"></div>
                    <span id="serverStatusText">System Ready</span>
                </div>
                <div class="legend">
                    <span class="legend-item"><span class="color-box unvisited"></span> Unvisited</span>
                    <span class="legend-item"><span class="color-box visited"></span> Visited</span>
                    <span class="legend-item"><span class="color-box active"></span> Active</span>
                    <span class="legend-item"><span class="color-box path"></span> Shortest Path</span>
                </div>
            </header>

            <!-- Loading overlay -->
            <div id="loadingOverlay" class="loading-overlay hidden">
                <div class="spinner"></div>
                <p>Processing...</p>
            </div>

            <!-- Canvas Container -->
            <div class="canvas-container" id="canvasContainer">
                <canvas id="graphCanvas"></canvas>
            </div>

            <!-- Logs / Output panel -->
            <div class="logs-panel" id="logsPanel">
                <div class="logs-header">
                    <h3>Traversal Log</h3>
                    <button id="btnClearLogs" class="btn-text">Clear</button>
                </div>
                <div class="logs-content" id="logsContent">
                    <p class="log-entry system">Welcome to Graph Algorithm Simulator.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
